<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="Aurora Calculator - A premium glassmorphism calculator built with HTML, CSS and JavaScript.">

    <meta
        name="keywords"
        content="Calculator, HTML, CSS, JavaScript, Glassmorphism, Portfolio">

    <meta
        name="author"
        content="Komal Jawliya">

    <title>Aurora Calculator</title>

    <!-- Google Font -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Remix Icons -->

    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <!-- ==========================
            Animated Background
    =========================== -->

    <div class="background">

        <span class="blob blob-1"></span>

        <span class="blob blob-2"></span>

        <span class="blob blob-3"></span>

        <div class="grid-overlay"></div>

    </div>


    <!-- ==========================
            Calculator
    =========================== -->

    <main class="calculator">

        <!-- Top Bar -->

        <header class="calculator-header">

            <div class="logo">

                <i class="ri-calculator-line"></i>

                <span>Aurora</span>

            </div>

            <button
                class="theme-btn"
                id="themeBtn">

                <i class="ri-moon-fill"></i>

            </button>

        </header>


        <!-- Display -->

        <section class="display-container">

            <div
                class="history"
                id="history">

            </div>

            <input
                type="text"
                id="display"
                placeholder="0"
                readonly>

        </section>


        <!-- Buttons -->

        <section class="button-grid">

            <button class="action" data-value="AC">
                AC
            </button>

            <button class="action" data-value="DEL">
                DEL
            </button>

            <button class="action" data-value="%">
                %
            </button>

            <button class="operator" data-value="/">
                ÷
            </button>

            <button data-value="7">
                7
            </button>

            <button data-value="8">
                8
            </button>

            <button data-value="9">
                9
            </button>

            <button class="operator" data-value="*">
                ×
            </button>

            <button data-value="4">
                4
            </button>

            <button data-value="5">
                5
            </button>

            <button data-value="6">
                6
            </button>

            <button class="operator" data-value="-">
                −
            </button>

            <button data-value="1">
                1
            </button>

            <button data-value="2">
                2
            </button>

            <button data-value="3">
                3
            </button>

            <button class="operator" data-value="+">
                +
            </button>

            <button class="zero" data-value="0">
                0
            </button>

            <button data-value=".">
                .
            </button>

            <button class="equal" data-value="=">
                =
            </button>

        </section>


        <!-- Bottom Panel -->

        <footer class="calculator-footer">

            <button
                id="copyBtn"
                class="footer-btn">

                <i class="ri-file-copy-line"></i>

                Copy

            </button>


        </footer>

    </main>




    <div
        id="toast"
        class="toast">

        Copied Successfully

    </div>


    <!-- JavaScript -->

    <script src="script.js"></script>

</body>

</html>
